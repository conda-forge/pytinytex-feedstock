{% set version = "0.5.1" %}

package:
  name: pytinytex
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pytinytex/pytinytex-{{ version }}.tar.gz
  sha256: 206d2adcbe58262ee501399c7aed30b684473b03dcb71fc248271d1801138525

build:
  number: 0
  noarch: python
  entry_points:
    - pytinytex = pytinytex.cli:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}

test:
  imports:
    - pytinytex
  commands:
    - pip check
    - pytinytex --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/JessicaTegner/PyTinyTeX
  dev_url: https://github.com/JessicaTegner/PyTinyTeX
  doc_url: https://github.com/JessicaTegner/PyTinyTeX#readme
  summary: Thin wrapper for TinyTeX.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - JessicaTegner
